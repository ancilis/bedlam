services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: bedlam
      POSTGRES_PASSWORD: bedlam
      POSTGRES_DB: bedlam
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bedlam -d bedlam"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://bedlam:bedlam@db:5432/bedlam
      PORT: "3100"
      SERVE_UI: "true"
      BEDLAM_DEPLOYMENT_MODE: "authenticated"
      BEDLAM_DEPLOYMENT_EXPOSURE: "private"
      BEDLAM_PUBLIC_URL: "${BEDLAM_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - bedlam-data:/bedlam
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  bedlam-data:
